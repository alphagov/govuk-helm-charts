rule_files:
  - search_api_v2.yaml

evaluation_interval: 1m

tests:
  - interval: 1m
    input_series:
      - series: 'http_requests_total{job="search-api-v2", controller="searches", action="show"}'
        values: '0+0x1 0+1x10'
      - series: 'http_requests_total{job="search-api-v2", controller="searches", action="show", status="200"}'
        values: '0+0x1 0+0.8x10'

    promql_expr_test:
      # Test base metrics
      - expr: search_api_v2:search:requests:total
        eval_time: 5m
        exp_samples:
          - labels: '{}'
            value: 5

      # Test success rate with some traffic
      - expr: search_api_v2:search:success_rate:5m
        eval_time: 5m
        exp_samples:
          - labels: '{}'
            value: 0.8

      # Test "no traffic" case (with separate test data)
      - expr: search_api_v2:search:success_rate:5m
        eval_time: 1m
        exp_samples:
          - labels: '{}'
            value: 1
