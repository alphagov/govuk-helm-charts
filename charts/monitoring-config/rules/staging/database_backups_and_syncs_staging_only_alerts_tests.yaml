          db_backup_job_state{
          database_engine="postgres",
          database_instance="release-postgres",
          database_db_name="release_production",
          operation="backup"
          }
        values: '2x5 1x30 2x25'
    alert_rule_test:
      - alertname: Database backup taking a long time - Quicker Databases
