rule_files:
  - search_api_alerts.yaml

evaluation_interval: 1m

tests:
# elasticsearch cluster status tests
  - interval: 1m
    input_series:
      - series: "search_api_elasticsearch_status"
        values: "0x40"
    alert_rule_test:
      - alertname: SearchApiElasticsearchClusterStatus
        eval_time: 5m
        exp_alerts: []
      - alertname: SearchApiElasticsearchClusterStatus
        eval_time: 30m
        exp_alerts: []
  - interval: 1m
    input_series:
      - series: "search_api_elasticsearch_status"
        values: "2x40"
    alert_rule_test:
      - alertname: SearchApiElasticsearchClusterStatus
        eval_time: 5m
        exp_alerts:
          - exp_labels:
              severity: critical
              destination: "slack-search-team"
            exp_annotations:
              summary: Elasticsearch cluster status is RED
              description: >-
                The Elasticsearch cluster used by Search API is in RED state.
                Some primary shards are unavailable and search indexing may fail.
  - interval: 1m
    input_series:
      - series: "search_api_elasticsearch_status"
        values: "1x40"
    alert_rule_test:
      - alertname: SearchApiElasticsearchClusterStatus
        eval_time: 30m
        exp_alerts:
          - exp_labels:
              severity: warning
              destination: "slack-search-team"
            exp_annotations:
              summary: Elasticsearch cluster status is YELLOW
              description: >-
                The Elasticsearch cluster used by Search API is in YELLOW state.
                Replica shards are not allocated. The cluster is still functional
                but resilience is reduced.
# elasticsearch disk space tests
  - interval: 1m
    input_series:
      - series: 'search_api_elasticsearch_disk_space{node="node1"}'
        values: "0.5x20"
    alert_rule_test:
      - alertname: SearchApiElasticsearchDiskSpaceLow
        eval_time: 15m
        exp_alerts: []
      - alertname: SearchApiElasticsearchDiskSpaceCritical
        eval_time: 10m
        exp_alerts: []
  - interval: 1m
    input_series:
      - series: 'search_api_elasticsearch_disk_space{node="node1"}'
        values: "0.25x20"
    alert_rule_test:
      - alertname: SearchApiElasticsearchDiskSpace
        eval_time: 15m
        exp_alerts:
          - exp_labels:
              severity: warning
              destination: "slack-search-team"
              node: node1
            exp_annotations:
              summary: Elasticsearch disk space low
              description: >-
                Elasticsearch node node1 has less than 30% disk space
                remaining. Consider increasing storage capacity.
  - interval: 1m
    input_series:
      - series: 'search_api_elasticsearch_disk_space{node="node1"}'
        values: "0.05x20"
    alert_rule_test:
      - alertname: SearchApiElasticsearchDiskSpace
        eval_time: 10m
        exp_alerts:
          - exp_labels:
              severity: critical
              destination: "slack-search-team"
              node: node1
            exp_annotations:
              summary: Elasticsearch disk space critical
              description: >-
                Elasticsearch node node1 has less than 10% disk space
                remaining.
# search-api cronjob tests
  - interval: 1m
    input_series:
      # No alert for cronjob failed as 2 days not reached
      - series: >-
          kube_cronjob_status_last_successful_time{
          cronjob="search-api-load-page-traffic"
          }
        values: '-179300+60x15'
    alert_rule_test:
      - alertname: CronjobFailed => CronjobSuccessThreshold
        eval_time: 15m
        exp_alerts: []

  - interval: 1m
    input_series:
      # Alert for cronjob failed
      - series: >-
          kube_cronjob_status_last_successful_time{
          cronjob="search-api-load-page-traffic"
          }
        values: '-180300+60x15'
    alert_rule_test:
      - alertname: CronjobFailed => CronjobSuccessThreshold
        eval_time: 10m
        exp_alerts:
          - exp_labels:
              alertname: CronjobFailed
              destination: slack-search-team
              cronjob: search-api-load-page-traffic
              severity: critical
            exp_annotations:
              summary: search-api-load-page-traffic cronjob failing
              description: >-
                The cronjob "search-api-load-page-traffic" has not run successfully
                since 1970-01-03 02:05:00 +0000 UTC
              cronjob_uri: >-
                applications/search-api?orphaned=false&resource=&node=batch%2FCronJob%2Fapps%2Fsearch-api-load-page-traffic%2F0&tab=logs
