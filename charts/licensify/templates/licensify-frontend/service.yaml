{{ $app := .Values.licensifyFrontend }}
{{ $_ := set .Values "appName" $app.name }}
apiVersion: v1
kind: Service
metadata:
  name: {{ $app.name }}
  labels:
    {{- include "licensify.labels" . | nindent 4}}
    app: {{ $app.name }}
    app.kubernetes.io/component: app
spec:
  type: {{ $app.service.type }}
  ports:
    - name: {{ $app.name }}-http
      port: {{ $app.service.port }}
      targetPort: {{ $app.service.targetPort }}
      protocol: TCP
  selector:
    app: {{ $app.name }}
