{{ $app := .Values.licensifyFeed }}
{{ $_ := set .Values "appName" $app.name }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $app.name }}
  labels:
    {{- include "licensify.labels" . | nindent 4}}
    app: {{ $app.name }}
    app.kubernetes.io/component: app
spec:
  replicas: {{ $app.replicaCount }}
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: {{ $app.name }}
  template:
    metadata:
      labels:
        {{- include "licensify.labels" . | nindent 8}}
        app: {{ $app.name }}
        app.kubernetes.io/component: app
    spec:
      securityContext:
        fsGroup: {{ .Values.securityContext.runAsGroup }}
        runAsNonRoot: {{ .Values.securityContext.runAsNonRoot }}
        runAsUser: {{ .Values.securityContext.runAsUser }}
        runAsGroup: {{ .Values.securityContext.runAsGroup }}
      containers:
        - name: main
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.images.LicensifyFeed.repository }}:{{ .Values.images.LicensifyFeed.tag }}"
          imagePullPolicy: "IfNotPresent"
          env:
            {{- with .Values.extraEnv }}
              {{- (tpl (toYaml .) $) | trim | nindent 12 }}
            {{- end }}
          ports:
            - name: http
              containerPort: {{ $app.service.targetPort }}
          livenessProbe:
            tcpSocket:
              port: {{ $app.service.targetPort }}
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 2
            successThreshold: 1
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              port: {{ $app.service.targetPort }}
              path: {{ $app.service.readinessPath | default "/" }}
            initialDelaySeconds: 10
            failureThreshold: 3
            periodSeconds: 10
            successThreshold: 1
            timeoutSeconds: 5
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: gds-licensing-config
              mountPath: "/etc/licensing"
              readOnly: true
            - name: app-tmp
              mountPath: /tmp
      volumes:
        - name: gds-licensing-config
          secret:
            secretName: gds-licensing-config.properties
        - name: app-tmp
          emptyDir: {}