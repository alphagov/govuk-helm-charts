{{- $fullName := include "router-probe-backend.fullname" . }}
apiVersion: v1
kind: Service
metadata:
  name: {{ $fullName }}
  labels:
    app: {{ $fullName }}
    app.kubernetes.io/name: {{ $fullName }}
    app.kubernetes.io/component: app
spec:
  type: ClusterIP
  ports:
    - name: nginx
      port: 8080
      targetPort: 80
  selector:
    app: {{ $fullName }}
    app.kubernetes.io/component: nginx
