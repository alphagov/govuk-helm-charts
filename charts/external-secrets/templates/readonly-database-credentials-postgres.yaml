{{- range $appName := .Values.provisionDatabaseReadonlySecrets.postgres }}
{{- $k8sFriendlyAppName := regexReplaceAll "_" $appName "-" }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ $k8sFriendlyAppName }}-postgres-readonly
  labels:
    {{- include "external-secrets.labels" $ | nindent 4 }}
  annotations:
    kubernetes.io/description: >
      Readonly PostgreSQL credentials for {{ $appName }}
spec:
  refreshInterval: {{ $.Values.externalSecrets.refreshInterval }}
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    deletionPolicy: {{ $.Values.externalSecrets.deletionPolicy }}
    name: {{ $k8sFriendlyAppName }}-postgres-readonly
  dataFrom:
    - extract:
        key: govuk/{{ $appName }}/postgres-readonly
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
---
{{- end }}
