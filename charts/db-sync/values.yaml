# db-sync Helm Chart Configuration

nameOverride: ""
fullnameOverride: ""

# Suspend all CronJobs globally
suspendAllCronJobs: false

# Image configuration for the db-sync binary
image:
  repository: "172025368201.dkr.ecr.eu-west-1.amazonaws.com/github/alphagov/govuk/govuk-db-sync"
  tag: "latest"
  pullPolicy: IfNotPresent

# Resource limits and requests
appResources:
  limits:
    cpu: 2000m
    memory: 1024Mi
  requests:
    cpu: 400m
    memory: 512Mi

transformResources:
  limits:
    cpu: 2000m
    memory: 1024Mi
  requests:
    cpu: 400m
    memory: 512Mi

# Pod security context
podSecurityContext:
  fsGroup: 1001
  runAsNonRoot: true
  runAsUser: 1001
  runAsGroup: 1001
  seccompProfile:
    type: RuntimeDefault

# Container security context
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: ["ALL"]

# Service account configuration
serviceAccount:
  create: true
  name: db-sync
  annotations:
    eks.amazonaws.com/role-arn: ""  # Overridden in app-config (Argo CD)

# External Secrets configuration for AWS Secrets Manager
externalSecrets:
  refreshInterval: 1h
  deletionPolicy: Delete
  # AWS Secrets Manager secret key containing database passwords
  # Expected format: {hostname: password, ...}
  secretKey: "govuk/db-sync/passwd"

# Global extra environment variables
extraEnv: []

# govukEnvironment determines which set of jobs to use from `cronjobs` below
# (production, staging, integration, etc.)
govukEnvironment: staging  # Overridden in app-config (Argo CD)

# CronJobs configuration
# Structure:
#   cronjobs:
#     <environment>:
#       <job-name>:
#         schedule: "0 2 * * *"          # Cron schedule (required)
#         operation: backup              # Operation: backup, restore, or sync (required)
#         dbType: postgres               # Database type: postgres, mysql, documentdb (required)
#         dbName: mydb                   # Database name (required)
#         s3Bucket: s3://my-bucket       # S3 bucket (required for backup/restore)
#         s3Path: app/db                 # S3 path prefix (required for backup/restore)
#         suspend: false                 # Suspend this job (optional)
#         maxJobRuntimeSeconds: 43200    # Max runtime in seconds (default: 12 hours)
#         transformScript: script.sql    # Transform script filename from ConfigMap (optional)
#         extraEnv: []                   # Job-specific env vars (optional)

cronjobs:
  production: {}
    # Example PostgreSQL backup job:
    # account-api-postgres:
    #   schedule: "37 23 * * *"
    #   operation: backup
    #   dbType: postgres
    #   dbName: account-api_production
    #   s3Bucket: s3://govuk-prod-database-backups
    #   s3Path: account-api/db
    #
    # Example PostgreSQL with restore and transform:
    # email-alert-api-postgres:
    #   schedule: "54 3 * * 1"
    #   operation: restore
    #   dbType: postgres
    #   dbName: email-alert-api_production
    #   s3Bucket: s3://govuk-staging-database-backups
    #   s3Path: email-alert-api/db
    #   transformScript: email-alert-api.sql
    #   extraEnv:
    #     - name: DB_OWNER
    #       value: email-alert-api
    #
    # Example MySQL backup:
    # release-mysql:
    #   schedule: "11 3 * * 1"
    #   operation: backup
    #   dbType: mysql
    #   dbName: release_production
    #   s3Bucket: s3://govuk-prod-database-backups
    #   s3Path: release/db
    #
    # Example DocumentDB backup:
    # publisher-documentdb:
    #   schedule: "13 3 * * 1"
    #   operation: backup
    #   dbType: documentdb
    #   dbName: publisher_production
    #   s3Bucket: s3://govuk-prod-database-backups
    #   s3Path: publisher/docdb

  staging: {}

  integration: {}
