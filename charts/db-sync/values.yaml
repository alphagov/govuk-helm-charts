# db-sync Helm Chart Configuration

nameOverride: ""
fullnameOverride: ""

# Suspend all CronJobs globally
suspendAllCronJobs: false

# Image configuration for the main db-sync app container
appImage:
  repository: "172025368201.dkr.ecr.eu-west-1.amazonaws.com/github/alphagov/govuk/govuk-db-sync"
  tag: "latest"
  pullPolicy: IfNotPresent

# Image configuration for transform sidecar containers by database engine
transformImage:
  postgres:
    repository: "postgres"
    tag: "17-alpine"
    pullPolicy: IfNotPresent
  mysql:
    repository: "mysql"
    tag: "8.4"
    pullPolicy: IfNotPresent
  docdb:
    repository: "mongo"
    tag: "3.6"
    pullPolicy: IfNotPresent

# Resource limits and requests
appResources:
  limits:
    cpu: 2000m
    memory: 1024Mi
  requests:
    cpu: 400m
    memory: 512Mi

transformResources:
  limits:
    cpu: 2000m
    memory: 1024Mi
  requests:
    cpu: 400m
    memory: 512Mi

# Pod security context
podSecurityContext:
  fsGroup: 1001
  runAsNonRoot: true
  runAsUser: 1001
  runAsGroup: 1001
  seccompProfile:
    type: RuntimeDefault

# Container security context
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: ["ALL"]

# Sidecar container security context for transform database engines
transformSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: ["ALL"]

# Service account configuration
serviceAccount:
  create: true
  name: db-sync
  annotations:
    eks.amazonaws.com/role-arn: ""  # Overridden in app-config (Argo CD)

# External Secrets configuration for AWS Secrets Manager
externalSecrets:
  refreshInterval: 1h
  deletionPolicy: Delete
  # AWS Secrets Manager secret key containing database passwords
  # Expected format: {hostname: password, ...}
  secretKey: "govuk/db-sync/passwd"

# Global extra environment variables
extraEnv: []

# govukEnvironment determines which set of jobs to use from `cronjobs` below
# (production, staging, integration, etc.)
govukEnvironment: staging  # Overridden in app-config (Argo CD)

# CronJobs configuration
# Structure:
#   cronjobs:
#     <environment>:
#       <job-name>:
#         schedule: "0 2 * * *"          # Cron schedule (required)
#         operation: backup              # Operation: backup or restore (required)
#         dbType: postgres               # Database type: postgres, mysql, documentdb (required)
#         dbName: mydb                   # Database name (required)
#         s3Bucket: s3://my-bucket       # S3 bucket (required for backup/restore)
#         s3Path: app/db                 # S3 path prefix (required for backup/restore)
#         sourceUri: postgres://...      # Source connection URI (required for backup)
#         destUri: postgres://...        # Destination connection URI (required for restore)
#         suspend: false                 # Suspend this job (optional)
#         maxJobRuntimeSeconds: 43200    # Max runtime in seconds (default: 12 hours)
#         transformScript: script.sql    # Transform script filename from ConfigMap (optional, backup only)
#         threads: 4                     # Concurrent threads for dump/restore (optional)
#         dbOwner: role_name             # Database owner role (optional, restore+postgres only)
#         docdbSourceDb: db_name         # Source database name (optional, restore+documentdb only)
#         extraEnv: []                   # Job-specific env vars (optional)

cronjobs:
  production: {}
    # See values-production.yaml for production job definitions

  staging: {}
    # See values-staging.yaml for staging job definitions

  integration: {}
    # See values-integration.yaml for integration job definitions
