name: Router probe backend tests
on:
  pull_request:
    paths:
      - charts/router-probe-backend/**
  push:
    branches:
      - main
    paths:
      - charts/router-probe-backend/**

permissions:
  contents: read

jobs:
  test-backend:
    permissions:
      contents: read
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1   # v7.0.1
        with:
          show-progress: false
      - working-directory: charts/router-probe-backend/tests
        shell: bash
        run: ./run-tests.sh
