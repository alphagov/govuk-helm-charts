name: Router probe backend tests
on:
  pull_request:
    paths:
      - charts/router-probe-backend/**
  push:
    branches:
      - main
    paths:
      - charts/router-probe-backend/**

permissions:
  contents: read

jobs:
  test-backend:
    permissions:
      contents: read
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10   # v6.0.3
        with:
          show-progress: false
      - working-directory: charts/router-probe-backend/tests
        shell: bash
        run: ./run-tests.sh
